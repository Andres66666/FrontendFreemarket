<h2 class="text-center mb-3 fs-sm">Lista de Permisos</h2>

<!-- FILTROS -->
<div class="row g-2 mb-3">
  <!-- NOMBRE -->
  <div class="col-8 col-sm-6 col-lg-9">
    <label class="form-label small fw-semibold mb-1 fs-xs"> Nombre </label>

    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="Buscar permiso..."
      [(ngModel)]="searchNombrePermiso"
    />
  </div>

  <!-- BOTÓN -->
  <div class="col-4 col-sm-6 col-lg-3">
    <label class="form-label small fw-semibold mb-1 fs-xs"> Registrar </label>

    <button class="btn btn-success btn-sm w-100" (click)="registrarPermiso()">
      <i class="bi bi-journal-plus me-1"></i>
      <span class="d-none d-lg-inline"> Registrar </span>
    </button>
  </div>
</div>

<!-- TABLA -->
<div class="table-responsive shadow-sm mb-2">
  <table class="table table-sm table-hover align-middle mb-0">
    <thead class="table-light sticky-top">
      <tr class="fs-xs">
        <th>Permiso</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr
        *ngFor="let permiso of filteredPermisos()"
        [ngClass]="{
          'table-danger': !permiso.estado_Permiso,
          'table-success': permiso.estado_Permiso,
        }"
      >
        <!-- NOMBRE -->
        <td class="fs-xs fw-semibold">
          {{ permiso.nombre_permiso }}
        </td>

        <!-- DESCRIPCIÓN -->
        <td class="fs-xxs">
          {{ permiso.descripcion }}
        </td>

        <!-- ESTADO -->
        <td class="fs-xs">
          <span
            class="badge rounded-pill fs-xxs"
            [ngClass]="{
              'bg-danger': !permiso.estado_Permiso,
              'bg-success': permiso.estado_Permiso,
            }"
          >
            {{ permiso.estado_Permiso ? "Activo" : "Inactivo" }}
          </span>
        </td>

        <!-- ACCIONES -->
        <td>
          <div class="btn-group btn-group-sm" role="group">
            <!-- EDITAR -->
            <button
              class="btn btn-primary btn-sm py-0"
              (click)="editarPermiso(permiso.id)"
              title="Editar"
            >
              <i class="bi bi-pencil"></i>
            </button>

            <!-- ACTIVAR / DESACTIVAR -->
            <button
              class="btn btn-sm py-0"
              [ngClass]="permiso.estado_Permiso ? 'btn-danger' : 'btn-success'"
              (click)="togglePermisoActivo(permiso)"
              [title]="permiso.estado_Permiso ? 'Desactivar' : 'Activar'"
            >
              <i
                class="bi"
                [ngClass]="
                  permiso.estado_Permiso ? 'bi-toggle-on' : 'bi-toggle-off'
                "
              ></i>
            </button>
          </div>
        </td>
      </tr>

      <!-- SIN DATOS -->
      <tr *ngIf="filteredPermisos().length === 0">
        <td colspan="4" class="text-center py-4 text-muted fs-xs">
          <i class="bi bi-search fs-4"></i>
          <br />
          No se encontraron permisos
        </td>
      </tr>
    </tbody>
  </table>
</div>
