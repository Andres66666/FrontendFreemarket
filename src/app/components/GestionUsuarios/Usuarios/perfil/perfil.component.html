<div class="container py-4" *ngIf="usuarioSeleccionado">
  <div class="card shadow border-0">
    <div class="card-header bg-primary text-white">
      <h3 class="mb-0">
        <i class="bi bi-person-circle me-2"></i>
        Mi Perfil
      </h3>
    </div>

    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="row g-4">
          <!-- FOTO -->
          <div class="col-lg-4 text-center">
            <img
              *ngIf="!selectedImage && usuarioSeleccionado?.imagen_url"
              [src]="usuarioSeleccionado.imagen_url"
              class="img-thumbnail rounded-circle shadow-sm mb-3"
              style="width: 250px; height: 250px; object-fit: cover"
            />

            <img
              *ngIf="selectedImage"
              [src]="imagePreviewUrl"
              class="img-thumbnail rounded-circle shadow-sm mb-3"
              style="width: 250px; height: 250px; object-fit: cover"
            />

            <div>
              <label class="btn btn-outline-primary">
                <i class="bi bi-camera-fill me-2"></i>
                Cambiar Foto
                <input
                  hidden
                  type="file"
                  accept="image/*"
                  (change)="onImageSelected($event)"
                />
              </label>
            </div>
          </div>

          <!-- DATOS -->
          <div class="col-lg-8">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-semibold">
                  Nombre de Usuario
                </label>
                <input
                  type="text"
                  formControlName="nombre_usuario"
                  class="form-control"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold"> Apellido </label>
                <input
                  type="text"
                  formControlName="apellido"
                  class="form-control"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">
                  Fecha de Nacimiento
                </label>
                <input
                  type="date"
                  formControlName="fecha_nacimiento"
                  class="form-control"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold"> Teléfono </label>
                <input
                  type="text"
                  formControlName="telefono"
                  class="form-control"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold">
                  Correo Electrónico
                </label>
                <input
                  type="email"
                  formControlName="correo"
                  class="form-control"
                />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold"> Contraseña </label>

                <div class="input-group">
                  <input
                    [type]="isPasswordVisible ? 'text' : 'password'"
                    formControlName="password"
                    class="form-control"
                    placeholder="Nueva contraseña"
                  />

                  <button
                    type="button"
                    class="btn btn-outline-secondary"
                    (click)="togglePasswordVisibility()"
                  >
                    <i
                      [ngClass]="
                        isPasswordVisible ? 'bi bi-eye-slash' : 'bi bi-eye'
                      "
                    ></i>
                  </button>
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold"> C.I. </label>
                <input type="text" formControlName="ci" class="form-control" />
              </div>

              <div class="col-md-6">
                <label class="form-label fw-semibold"> Departamento </label>

                <select formControlName="ci_departamento" class="form-select">
                  <option value="">Seleccione</option>
                  <option value="LP">La Paz</option>
                  <option value="CB">Cochabamba</option>
                  <option value="SC">Santa Cruz</option>
                  <option value="BN">Beni</option>
                  <option value="PD">Pando</option>
                  <option value="TJ">Tarija</option>
                  <option value="CH">Chuquisaca</option>
                  <option value="OR">Oruro</option>
                  <option value="PT">Potosí</option>
                </select>
              </div>
            </div>

            <hr class="my-4" />

            <button
              type="submit"
              class="btn btn-success btn-lg"
              [disabled]="form.invalid && form.get('password')?.value !== ''"
            >
              <i class="bi bi-check-circle-fill me-2"></i>
              Actualizar Perfil
            </button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
