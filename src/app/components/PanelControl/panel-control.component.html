<section class="layout">
  <!-- HEADER -->
  <header class="header">
    <button
      class="toggle-button btn border-0 shadow-sm me-3"
      (click)="toggleSidebar()"
    >
      <i
        class="bi"
        [ngClass]="isSidebarOpen ? 'bi-text-indent-right' : 'bi-list'"
      ></i>
    </button>

    <div
      class="fw-bold text-white"
      style="cursor: pointer"
      (click)="panelDeControl()"
    >
      <i class="bi bi-shop-window me-2"></i>
      Panel de Control
    </div>

    <div class="ms-auto d-flex align-items-center gap-3">
      <button
        class="btn btn-outline-light rounded-pill d-flex align-items-center"
        (click)="verPerfil()"
      >
        <img *ngIf="imagen_url" [src]="imagen_url" class="avatar" />

        <div class="user-info d-none d-md-flex">
          <span class="fw-semibold"> {{ nombre_usuario }} {{ apellido }} </span>

          <small>
            {{ roles.join(", ") }}
          </small>
        </div>
      </button>

      <button
        class="btn btn-outline-light rounded-pill"
        (click)="confirmarCerrarSesion()"
      >
        <i class="bi bi-box-arrow-right me-1"></i>
        Salir
      </button>
    </div>
  </header>

  <!-- SIDEBAR -->
  <aside
    class="leftSide"
    [ngClass]="isSidebarOpen ? 'sidebar-open' : 'sidebar-closed'"
  >
    <ul class="list-group list-group-flush">
      <!-- USUARIOS -->
      <li
        *ngIf="tieneRol('Administrador')"
        class="list-group-item d-flex justify-content-between align-items-center"
        (click)="toggleSection('usuarios')"
      >
        <div>
          <i class="bi bi-people-fill me-2"></i>
          <span>Gestión Usuarios</span>
        </div>

        <i
          class="bi"
          [ngClass]="
            isActive('usuarios') ? 'bi-chevron-down' : 'bi-chevron-right'
          "
        ></i>
      </li>

      <ul
        class="list-group list-group-flush ps-3"
        *ngIf="isActive('usuarios') && isSidebarOpen"
      >
        <li
          *ngIf="puedeVer('registrarRoles')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-roles')"
        >
          <i class="bi bi-person-vcard-fill me-2"></i>
          Roles
        </li>

        <li
          *ngIf="puedeVer('registrarPermisos')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-permisos')"
        >
          <i class="bi bi-shield-lock-fill me-2"></i>
          Permisos
        </li>

        <li
          *ngIf="puedeVer('registrarUsuarios')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-usuarios')"
        >
          <i class="bi bi-person-lines-fill me-2"></i>
          Usuarios
        </li>

        <li
          *ngIf="puedeVer('registrarUsuarioRoles')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-usuarios-roles')"
        >
          <i class="bi bi-diagram-3-fill me-2"></i>
          Usuarios - Roles
        </li>

        <li
          *ngIf="puedeVer('registrarRolesPermisos')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-roles-permisos')"
        >
          <i class="bi bi-diagram-2-fill me-2"></i>
          Roles - Permisos
        </li>
      </ul>

      <!-- PRODUCTOS -->
      <li
        class="list-group-item d-flex justify-content-between align-items-center"
        (click)="toggleSection('productos')"
      >
        <div>
          <i class="bi bi-bag-check-fill me-2"></i>
          <span>Productos y Ventas</span>
        </div>

        <i
          class="bi"
          [ngClass]="
            isActive('productos') ? 'bi-chevron-down' : 'bi-chevron-right'
          "
        ></i>
      </li>

      <ul
        class="list-group list-group-flush ps-3"
        *ngIf="isActive('productos') && (isSidebarOpen || windowWidth >= 992)"
      >
        <li
          *ngIf="puedeVer('registrarCategorias')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-categorias')"
        >
          <i class="bi bi-tags-fill me-2"></i>
          Categorías
        </li>

        <li
          *ngIf="puedeVer('registrarProductos')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-productos')"
        >
          <i class="bi bi-box-seam-fill me-2"></i>
          Productos
        </li>

        <li
          *ngIf="puedeVer(['registrarVenta', 'registrarVenta-Empleado'])"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-ventas')"
        >
          <i class="bi bi-cart-check-fill me-2"></i>
          Ventas
        </li>

        <li
          *ngIf="
            puedeVer([
              'registrarDetalleVenta',
              'registrar-DetalleVenta-Empleado',
            ])
          "
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-detalle-ventas')"
        >
          <i class="bi bi-receipt-cutoff me-2"></i>
          Detalle Ventas
        </li>

        <li
          *ngIf="
            puedeVer([
              'registrarVenta-DetalleVenta-Administrador',
              'registrarVenta-DetalleVenta-Empleado',
            ])
          "
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/listar-productos-empleado')"
        >
          <i class="bi bi-bag-plus-fill me-2"></i>
          Vender Productos
        </li>

        <li
          *ngIf="puedeVer('Efectivo')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/efectivo')"
        >
          <i class="bi bi-cash-stack me-2"></i>
          Efectivo
        </li>

        <li
          *ngIf="puedeVer('Prestamos')"
          class="list-group-item"
          (click)="navegarYRegresar('/panel-control/prestamo')"
        >
          <i class="bi bi-cash-coin me-2"></i>
          Prestamos
        </li>
      </ul>
    </ul>
  </aside>

  <!-- OVERLAY -->
  <div
    *ngIf="windowWidth < 992 && isSidebarOpen"
    class="overlay"
    (click)="toggleSidebar()"
  ></div>

  <!-- CONTENIDO -->
  <!-- Cambia tu <main> actual por este -->
  <main
    class="main-content"
    [class.content-shifted]="isSidebarOpen"
    (click)="onMainContentClick()"
  >
    <div class="content-card">
      <router-outlet></router-outlet>
    </div>
  </main>
</section>
