<section class="layout min-vh-100 d-flex flex-column bg-light">
  <nav
    class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top"
    style="background: #6cc9be"
  >
    <div class="container-fluid">
      <!-- BOTON MENU -->
      <button
        class="btn btn-light btn-sm me-2 d-lg-none"
        type="button"
        (click)="toggleSidebar()"
      >
        <i class="bi bi-list fs-5"></i>
      </button>

      <!-- TITULO -->
      <a
        class="navbar-brand fw-semibold"
        (click)="panelDeControl()"
        style="cursor: pointer"
      >
        <i class="bi bi-shop-window me-2"></i> Panel de Control
      </a>

      <!-- DERECHA -->
      <div class="d-flex align-items-center gap-3 ms-auto">
        <!-- PERFIL -->
        <button
          class="btn btn-outline-light btn-sm rounded-pill d-flex align-items-center px-3"
          (click)="verPerfil()"
        >
          <!-- IMAGEN -->
          <img
            *ngIf="imagen_url"
            [src]="imagen_url"
            class="rounded-circle border border-2 border-white shadow-sm"
            style="width: 38px; height: 38px; object-fit: cover"
          />

          <!-- NOMBRE Y ROL -->
          <div class="d-none d-md-flex flex-column ms-2 text-start lh-sm">
            <span class="fw-semibold" style="font-size: 0.9rem">
              {{ nombre_usuario }} {{ apellido }}
            </span>

            <span class="small opacity-75" style="font-size: 0.75rem">
              {{ roles }}
            </span>
          </div>
        </button>

        <!-- BOTON SALIR -->
        <button
          class="btn btn-outline-light btn-sm rounded-pill btn-salir"
          (click)="confirmarCerrarSesion()"
        >
          <i class="bi bi-box-arrow-right me-1"></i> Salir
        </button>
      </div>
    </div>
  </nav>

  <!-- BODY -->
  <div class="d-flex flex-grow-1 position-relative">
    <!-- SIDEBAR -->
    <aside
      class="leftSide shadow-sm text-white"
      [ngClass]="[
        isSidebarOpen ? 'sidebar-open' : 'sidebar-closed',
        isSidebarCollapsed ? 'sidebar-collapsed' : '',
      ]"
      style="background: #6cc9be"
    >
      <div class="p-3">
        <ul class="list-group list-group-flush">
          <!-- GESTIÓN USUARIOS -->
          <li
            *ngIf="tieneRol('Administrador')"
            class="list-group-item border-0 rounded-4 mb-2 d-flex justify-content-between align-items-center text-white"
            (click)="toggleSubmenu('usuarios')"
            style="background: rgba(255, 255, 255, 0.18); cursor: pointer"
          >
            <div class="d-flex align-items-center gap-2">
              <i class="bi bi-people-fill"></i>
              <span class="fw-semibold">Gestión de Usuarios</span>
            </div>
            <i
              class="bi"
              [ngClass]="
                isSubmenuOpen('usuarios')
                  ? 'bi-chevron-down'
                  : 'bi-chevron-right'
              "
            >
            </i>
          </li>

          <ul
            class="list-group list-group-flush ps-2"
            *ngIf="isSubmenuOpen('usuarios')"
          >
            <li
              *ngIf="puedeVer('registrarRoles')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-roles"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-person-vcard-fill me-2"></i> Roles
            </li>

            <li
              *ngIf="puedeVer('registrarPermisos')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-permisos"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-shield-lock-fill me-2"></i> Permisos
            </li>

            <li
              *ngIf="puedeVer('registrarUsuarios')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-usuarios"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-person-lines-fill me-2"></i> Usuarios
            </li>

            <li
              *ngIf="puedeVer('registrarUsuarioRoles')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-usuarios-roles"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-diagram-3-fill me-2"></i> Usuarios - Roles
            </li>

            <li
              *ngIf="puedeVer('registrarRolesPermisos')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-roles-permisos"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-diagram-2-fill me-2"></i> Roles - Permisos
            </li>
          </ul>

          <!-- PRODUCTOS Y VENTAS -->
          <li
            class="list-group-item border-0 rounded-4 mb-2 d-flex justify-content-between align-items-center text-white"
            (click)="toggleSubmenu('productos')"
            style="background: rgba(255, 255, 255, 0.18); cursor: pointer"
          >
            <div class="d-flex align-items-center gap-2">
              <i class="bi bi-bag-check-fill"></i>
              <span class="fw-semibold">Productos y Ventas</span>
            </div>
            <i
              class="bi"
              [ngClass]="
                isSubmenuOpen('productos')
                  ? 'bi-chevron-down'
                  : 'bi-chevron-right'
              "
            >
            </i>
          </li>

          <ul
            class="list-group list-group-flush ps-2"
            *ngIf="isSubmenuOpen('productos')"
          >
            <li
              *ngIf="puedeVer('registrarCategorias')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-categorias"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-tags-fill me-2"></i> Categorías
            </li>

            <li
              *ngIf="puedeVer('registrarProductos')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-productos"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-box-seam-fill me-2"></i> Productos
            </li>

            <li
              *ngIf="puedeVer(['registrarVenta', 'registrarVenta-Empleado'])"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-ventas"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-cart-check-fill me-2"></i> Ventas
            </li>

            <li
              *ngIf="
                puedeVer([
                  'registrarDetalleVenta',
                  'registrar-DetalleVenta-Empleado',
                ])
              "
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/listar-detalle-ventas"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-receipt-cutoff me-2"></i> Detalle Ventas
            </li>

            <li
              *ngIf="
                puedeVer([
                  'registrarVenta-DetalleVenta-Administrador',
                  'registrarVenta-DetalleVenta-Empleado',
                ])
              "
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2"
              routerLink="/panel-control/listar-productos-empleado"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-bag-plus-fill me-2"></i> Vender Productos
            </li>

            <li
              *ngIf="puedeVer('Efectivo')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/efectivo"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-cash-stack me-2"></i> Efectivo
            </li>

            <li
              *ngIf="puedeVer('Prestamos')"
              class="list-group-item list-group-item-action border-0 rounded-4 mb-2 text-white"
              routerLink="/panel-control/prestamo"
              style="background: rgba(255, 255, 255, 0.14); cursor: pointer"
            >
              <i class="bi bi-cash-coin me-2"></i> Prestamos
            </li>
          </ul>
        </ul>
      </div>
    </aside>

    <!-- OVERLAY (móvil) -->
    <div
      class="position-absolute top-0 start-0 w-100 h-100"
      *ngIf="windowWidth < 768"
      [class.d-none]="!isSidebarOpen"
      (click)="toggleSidebar()"
      style="background: rgba(0, 0, 0, 0.45); z-index: 10"
    ></div>

    <!-- MAIN -->
    <main
      class="flex-grow-1 bg-light"
      style="z-index: 1"
      (click)="collapseSidebar()"
    >
      <div class="container-fluid p-3 p-md-4">
        <div class="card shadow-sm rounded-4 border-0">
          <div class="card-body">
            <router-outlet></router-outlet>
          </div>
        </div>
      </div>
    </main>
  </div>
</section>
