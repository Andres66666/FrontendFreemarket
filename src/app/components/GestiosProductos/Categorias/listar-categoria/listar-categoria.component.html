<h2 class="text-center mb-3 fs-sm">Lista de Categorías</h2>

<!-- FILTROS -->
<div class="row g-2 mb-3">
  <!-- NOMBRE -->
  <div class="col-8 col-sm-6 col-lg-9">
    <label class="form-label small fw-semibold mb-1 fs-xs">Nombre</label>
    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="Buscar categoría..."
      [(ngModel)]="searchNombreCategoria"
    />
  </div>

  <!-- BOTÓN -->
  <div class="col-4 col-sm-6 col-lg-3">
    <label class="form-label small fw-semibold mb-1 fs-xs">Registrar</label>
    <button
      class="btn btn-success w-100 btn-sm"
      (click)="registrarCategoriaClick()"
    >
      <i class="bi bi-journal-plus me-1"></i
      ><span class="d-none d-lg-inline">Registrar</span>
    </button>
  </div>
</div>

<!-- TABLA -->
<div class="table-responsive shadow-sm mb-2">
  <table class="table table-sm table-hover align-middle mb-0">
    <thead class="table-light sticky-top">
      <tr class="fs-xs">
        <th>Nombre</th>
        <th>Descripción</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody>
      <tr
        *ngFor="let categoria of filteredCategorias()"
        [ngClass]="{
          'table-danger': !categoria.estado_categoria,
          'table-success': categoria.estado_categoria,
        }"
      >
        <td class="fs-xs">{{ categoria.nombre_categoria }}</td>
        <td class="fs-xxs">{{ categoria.descripcion }}</td>
        <td class="fs-xs">
          <span
            class="badge rounded-pill fs-xxs"
            [ngClass]="{
              'bg-danger': !categoria.estado_categoria,
              'bg-success': categoria.estado_categoria,
            }"
          >
            {{ categoria.estado_categoria ? "Activo" : "Inactivo" }}
          </span>
        </td>
        <td>
          <div class="btn-group btn-group-sm" role="group">
            <button
              class="btn btn-primary btn-sm py-0"
              (click)="editarCategoriaClick(categoria.id)"
              title="Editar"
            >
              <i class="bi bi-pencil"></i>
            </button>
            <button
              class="btn btn-sm py-0"
              [ngClass]="
                categoria.estado_categoria ? 'btn-danger' : 'btn-success'
              "
              (click)="toggleCategoriaActivo(categoria)"
              [title]="categoria.estado_categoria ? 'Desactivar' : 'Activar'"
            >
              <i
                class="bi"
                [ngClass]="
                  categoria.estado_categoria ? 'bi-toggle-on' : 'bi-toggle-off'
                "
              ></i>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>
