<div class="container-fluid py-4">
  <div class="card border-0 shadow-lg">
    <!-- Header -->
    <div
      class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
    >
      <div>
        <h3 class="mb-0">
          <i class="bi bi-building"></i>
          Gestión de Sucursales
        </h3>
        <small>Total: {{ filteredSucursales().length }} sucursales</small>
      </div>

      <button class="btn btn-light" (click)="registrarSucursal()">
        <i class="bi bi-plus-circle"></i>
        Nueva Sucursal
      </button>
    </div>

    <!-- Body -->
    <div class="card-body">
      <!-- Buscador -->
      <div class="row mb-4">
        <div class="col-md-6">
          <div class="input-group">
            <span class="input-group-text">
              <i class="bi bi-search"></i>
            </span>

            <input
              type="text"
              class="form-control"
              placeholder="Buscar sucursal..."
              [(ngModel)]="searchNombre"
            />
          </div>
        </div>
      </div>

      <!-- Tabla -->
      <div class="table-responsive">
        <table class="table table-hover align-middle">
          <thead class="table-light">
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Dirección</th>
              <th>Teléfono</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>

          <tbody>
            <tr *ngFor="let sucursal of filteredSucursales(); let i = index">
              <td>
                <strong>{{ i + 1 }}</strong>
              </td>

              <td>
                <div class="fw-bold">{{ sucursal.nombre }}</div>
              </td>

              <td>{{ sucursal.direccion }}</td>

              <td>{{ sucursal.telefono }}</td>

              <td>
                <span
                  class="badge rounded-pill"
                  [ngClass]="
                    sucursal.estado
                      ? 'bg-success'
                      : 'bg-danger'
                  "
                >
                  <i
                    class="bi"
                    [ngClass]="
                      sucursal.estado
                        ? 'bi-check-circle-fill'
                        : 'bi-x-circle-fill'
                    "
                  ></i>

                  {{ sucursal.estado ? 'Activa' : 'Inactiva' }}
                </span>
              </td>

              <td class="text-center">
                <button
                  class="btn btn-outline-primary btn-sm me-2"
                  (click)="editarSucursal(sucursal.id)"
                >
                  <i class="bi bi-pencil-square"></i>
                  Editar
                </button>

                <button
                  class="btn btn-sm"
                  [ngClass]="
                    sucursal.estado
                      ? 'btn-outline-danger'
                      : 'btn-outline-success'
                  "
                  (click)="toggleSucursalActivo(sucursal)"
                >
                  <i
                    class="bi"
                    [ngClass]="
                      sucursal.estado
                        ? 'bi-toggle-off'
                        : 'bi-toggle-on'
                    "
                  ></i>

                  {{ sucursal.estado ? 'Desactivar' : 'Activar' }}
                </button>
              </td>
            </tr>

            <tr *ngIf="filteredSucursales().length === 0">
              <td colspan="6" class="text-center py-4 text-muted">
                <i class="bi bi-search fs-3"></i>
                <br />
                No se encontraron sucursales
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
