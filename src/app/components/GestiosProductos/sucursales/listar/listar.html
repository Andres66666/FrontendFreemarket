<h2 class="text-center mb-3 fs-sm">Lista de Sucursales</h2>

<!-- FILTROS -->
<div class="row g-2 mb-3">
  <!-- BUSCADOR -->
  <div class="col-8 col-sm-6 col-lg-9">
    <label class="form-label small fw-semibold mb-1 fs-xs"> Nombre </label>

    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="Buscar sucursal..."
      [(ngModel)]="searchNombre"
    />
  </div>

  <!-- BOTÓN -->
  <div class="col-4 col-sm-6 col-lg-3">
    <label class="form-label small fw-semibold mb-1 fs-xs"> Registrar </label>

    <button class="btn btn-success btn-sm w-100" (click)="registrarSucursal()">
      <i class="bi bi-building-add me-1"></i>
      <span class="d-none d-lg-inline"> Nueva Sucursal </span>
    </button>
  </div>
</div>

<!-- TABLA -->
<div class="table-responsive shadow-sm mb-2">
  <table class="table table-sm table-hover align-middle mb-0">
    <thead class="table-light sticky-top">
      <tr class="fs-xs">
        <th>#</th>
        <th>Nombre</th>
        <th>Dirección</th>
        <th>Teléfono</th>
        <th>Estado</th>
        <th>Acciones</th>
      </tr>
    </thead>

    <tbody>
      <tr
        *ngFor="
          let sucursal of filteredSucursales();
          let i = index
        "
        [ngClass]="{
          'table-danger': !sucursal.estado,
          'table-success': sucursal.estado
        }"
      >
        <td class="fs-xs fw-bold">{{ i + 1 }}</td>

        <td class="fs-xs">{{ sucursal.nombre }}</td>

        <td class="fs-xxs">{{ sucursal.direccion }}</td>

        <td class="fs-xs">{{ sucursal.telefono }}</td>

        <td class="fs-xs">
          <span
            class="badge rounded-pill fs-xxs"
            [ngClass]="{
              'bg-success': sucursal.estado,
              'bg-danger': !sucursal.estado
            }"
          >
            {{ sucursal.estado ? 'Activa' : 'Inactiva' }}
          </span>
        </td>

        <td>
          <div class="btn-group btn-group-sm" role="group">
            <button
              class="btn btn-primary btn-sm py-0"
              (click)="editarSucursal(sucursal.id)"
              title="Editar"
            >
              <i class="bi bi-pencil"></i>
            </button>

            <button
              class="btn btn-sm py-0"
              [ngClass]="
                sucursal.estado
                  ? 'btn-danger'
                  : 'btn-success'
              "
              (click)="toggleSucursalActivo(sucursal)"
              [title]="
                sucursal.estado
                  ? 'Desactivar'
                  : 'Activar'
              "
            >
              <i
                class="bi"
                [ngClass]="
                  sucursal.estado
                    ? 'bi-toggle-on'
                    : 'bi-toggle-off'
                "
              ></i>
            </button>
          </div>
        </td>
      </tr>

      <!-- SIN DATOS -->
      <tr *ngIf="filteredSucursales().length === 0">
        <td colspan="6" class="text-center py-4 text-muted fs-xs">
          <i class="bi bi-building-x fs-4"></i>

          <br />

          No se encontraron sucursales
        </td>
      </tr>
    </tbody>
  </table>
</div>
