<h2 class="text-center mb-3 fs-sm">Ventas</h2>

<div class="row g-2 mb-3">
  <!-- FILA 1: ID + Usuario (Select) -->
  <div class="col-4 col-sm-2 col-lg-1">
    <label class="form-label small fw-semibold mb-1 fs-xs">ID</label>
    <input
      type="text"
      class="form-control form-control-sm"
      placeholder="ID..."
      [(ngModel)]="searchID"
    />
  </div>

  <div class="col-8 col-sm-4 col-lg-3">
    <label class="form-label small fw-semibold mb-1 fs-xs">Usuario</label>
    <select class="form-select form-select-sm" [(ngModel)]="searchUsuario">
      <option value="">Usuario</option>
      <option
        *ngFor="let venta of getUsuariosUnicos()"
        [value]="venta.usuario.nombre_usuario + ' ' + venta.usuario.apellido"
      >
        {{ venta.usuario.nombre_usuario }} {{ venta.usuario.apellido }}
      </option>
    </select>
  </div>

  <!-- FILA 2: Estado + Fechas -->
  <div class="col-6 col-sm-3 col-lg-2">
    <label class="form-label small fw-semibold mb-1 fs-xs">Estado</label>
    <select class="form-select form-select-sm" [(ngModel)]="searchEstado">
      <option value="">Estado</option>
      <option value="Completada">Completada</option>
      <option value="Cancelada">Cancelada</option>
    </select>
  </div>

  <div class="col-3 col-sm-3 col-lg-2">
    <label class="form-label small fw-semibold mb-1 fs-xs">Desde</label>
    <input
      type="date"
      class="form-control form-control-sm"
      [(ngModel)]="searchFechaInicio"
    />
  </div>

  <div class="col-3 col-sm-3 col-lg-2">
    <label class="form-label small fw-semibold mb-1 fs-xs">Hasta</label>
    <input
      type="date"
      class="form-control form-control-sm"
      [(ngModel)]="searchFechaFin"
    />
  </div>

  <!-- BOTÓN -->
  <div class="col-12 col-sm-12 col-lg-2">
    <label class="form-label small fw-semibold mb-1 fs-xs">Actualizar</label>
    <button class="btn btn-primary w-100 btn-sm" (click)="updateList()">
      <i class="bi bi-arrow-clockwise me-1"></i
      ><span class="d-none d-lg-inline">Actualizar</span>
    </button>
  </div>
</div>

<!-- TABLA -->
<div class="table-responsive shadow-sm mb-2">
  <table class="table table-sm table-hover align-middle mb-0">
    <thead class="table-light sticky-top">
      <tr class="fs-xs">
        <th>ID</th>
        <th>Fecha</th>
        <th>Usuario</th>
        <th>Total</th>
        <th>Estado</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let venta of filteredVentas()">
        <td class="fs-xs">{{ venta.id }}</td>
        <td class="fs-xxs">
          {{ venta.fecha_venta | date: "dd/MM/yyyy HH:mm" }}
        </td>
        <td class="fs-xs">
          {{ venta.usuario.nombre_usuario }} {{ venta.usuario.apellido }}
        </td>
        <td class="fs-xs text-success">Bs {{ venta.total }}</td>
        <td class="fs-xs">
          <span
            class="badge rounded-pill fs-xxs"
            [ngClass]="{
              'bg-danger': venta.estado === 'Cancelada',
              'bg-success': venta.estado === 'Completada',
            }"
          >
            {{ venta.estado }}
          </span>
        </td>
      </tr>
    </tbody>
  </table>
</div>
